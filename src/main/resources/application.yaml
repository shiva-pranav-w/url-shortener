spring:
  application:
    name: urlshortener

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD}
    ssl: true

app:
  base-url: ${BASE_URL}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true